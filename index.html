<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no" />
    <meta name="theme-color" content="#0a0a0b" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Sora:wght@500;600;700;800&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@600;700;800&display=swap"
      rel="stylesheet"
    />
    <title>Padel Arena — Leaderboard & Americano</title>
    <script>
      // Apply saved theme before paint to avoid a flash. Default: light.
      try {
        document.documentElement.classList.add(
          localStorage.getItem('padel_theme') === 'dark' ? 'dark' : 'light'
        );
      } catch (e) {
        document.documentElement.classList.add('light');
      }
    </script>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
